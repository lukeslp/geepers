version: 1
manifest_name: geepers-skills-canonical
canonical_repo: https://github.com/lukeslp/geepers
canonical_root: skills/source
defaults:
  status: active
  owners:
    - geepers-core
  platforms:
    - claude
    - codex
    - gemini
    - manus
    - clawhub
skills:
  - id: geepers-builder
    source_path: skills/source/geepers-builder
    bundles: [core, workflow]
    description: Implementation execution specialist.

  - id: geepers-fetch
    source_path: skills/source/geepers-fetch
    bundles: [core, data]
    description: Structured data retrieval from external sources.

  - id: geepers-datavis
    source_path: skills/source/geepers-datavis
    bundles: [core, datavis]
    description: Data visualization design and implementation.

  - id: geepers-dream-swarm
    source_path: skills/source/geepers-dream-swarm
    bundles: [core, orchestration]
    description: Parallel multi-agent search workflows.

  - id: geepers-engineering
    source_path: skills/source/geepers-engineering
    bundles: [core, strategy]
    description: Engineering orchestrator skill.
    allow_legacy_name: true

  - id: geepers-executive
    source_path: skills/source/geepers-executive
    bundles: [core, strategy]
    description: Executive orchestration skill.
    allow_legacy_name: true

  - id: geepers-finance
    source_path: skills/source/geepers-finance
    bundles: [core, strategy]
    description: Finance and marketing orchestration skill.
    allow_legacy_name: true

  - id: geepers-git
    source_path: skills/source/geepers-git
    bundles: [core, maintenance]
    description: Repository hygiene and artifact concealment.

  - id: geepers-mcp
    source_path: skills/source/geepers-mcp
    bundles: [core, orchestration]
    description: Dream Cascade and Dream Swarm orchestration skill.

  - id: geepers-planner
    source_path: skills/source/geepers-planner
    bundles: [core, workflow]
    description: Plan and prioritize implementation tasks.

  - id: geepers-product
    source_path: skills/source/geepers-product
    bundles: [core, strategy]
    description: Product planning and PRD generation skill.
    allow_legacy_name: true

  - id: geepers-quality
    source_path: skills/source/geepers-quality
    bundles: [core, quality]
    description: Multi-agent quality review orchestration.

  - id: geepers-scout
    source_path: skills/source/geepers-scout
    bundles: [core, workflow]
    description: Project reconnaissance and quick-win analysis.

  - id: geepers-deploy
    source_path: skills/source/geepers-deploy
    bundles: [core, operations]
    description: Service deployment and routing operations.

  - id: geepers-swarm
    source_path: skills/source/geepers-swarm
    bundles: [core, orchestration]
    description: Parallel research swarm orchestration.

  - id: geepers-team
    source_path: skills/source/geepers-team
    bundles: [core, workflow]
    description: Master routing orchestrator for geepers skills.

  - id: geepers-testing
    source_path: skills/source/geepers-testing
    bundles: [core, quality]
    description: Test strategy and implementation guidance.

  - id: geepers-validate
    source_path: skills/source/geepers-validate
    bundles: [core, quality]
    description: Configuration and integration validation.

  - id: geepers-corpus
    source_path: skills/source/geepers-corpus
    bundles: [api]
    platforms: [claude, codex, gemini, manus, clawhub]
    description: COCA corpus linguistics API access.

  - id: geepers-data
    source_path: skills/source/geepers-data
